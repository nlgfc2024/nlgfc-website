name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to deploy"
        required: true
        default: "main"

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      deploy_ref: ${{ steps.resolve-ref.outputs.deploy_ref }}

    steps:
      - name: Resolve ref
        id: resolve-ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy_ref=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-ref.outputs.deploy_ref }}

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build Nuxt app
        run: |
          set -euo pipefail
          export NITRO_PRESET=node-server
          npm run build

  deploy:
    name: Deploy to VPS
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: http://41.77.13.188:8080/nlgfc-website/

    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.deploy_ref }}

      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for secret_name in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH DEPLOY_SSH_PRIVATE_KEY; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add deploy host to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Verify SSH authentication
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          SSH_OPTS="-p ${PORT} -o BatchMode=yes -o StrictHostKeyChecking=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no"

          echo "Loaded SSH key fingerprints:"
          ssh-add -l || true

          if ! ssh ${SSH_OPTS} "${DEPLOY_USER}@${DEPLOY_HOST}" "echo 'SSH auth OK'"; then
            echo "::group::SSH verbose diagnostics"
            ssh -vvv ${SSH_OPTS} "${DEPLOY_USER}@${DEPLOY_HOST}" "exit 1" || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Sync repository to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          SSH_OPTS="-p ${PORT} -o BatchMode=yes -o StrictHostKeyChecking=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no"
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "env" \
            --exclude "node_modules/" \
            --exclude ".nuxt/" \
            --exclude ".output/" \
            --exclude ".data/" \
            --exclude "build-smoke.log" \
            --exclude "*.log" \
            -e "ssh ${SSH_OPTS}" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Install, build, and restart app on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          SYSTEMD_SERVICE_NAME: ${{ secrets.SYSTEMD_SERVICE_NAME }}
          NUXT_PUBLIC_BASE_URL: ${{ secrets.NUXT_PUBLIC_BASE_URL }}
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
          NUXT_PUBLIC_JOBS_PORTAL_BASE: ${{ secrets.NUXT_PUBLIC_JOBS_PORTAL_BASE }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          SSH_OPTS="-p ${PORT} -o BatchMode=yes -o StrictHostKeyChecking=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no"

          ssh ${SSH_OPTS} "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' PM2_APP_NAME='${PM2_APP_NAME}' SYSTEMD_SERVICE_NAME='${SYSTEMD_SERVICE_NAME}' NUXT_PUBLIC_BASE_URL='${NUXT_PUBLIC_BASE_URL}' NUXT_PUBLIC_API_BASE='${NUXT_PUBLIC_API_BASE}' NUXT_PUBLIC_JOBS_PORTAL_BASE='${NUXT_PUBLIC_JOBS_PORTAL_BASE}' bash -s" << 'EOF'
          set -euo pipefail

          if [ -f "$HOME/.nvm/nvm.sh" ]; then
            . "$HOME/.nvm/nvm.sh"
            nvm use 22 || true
          fi

          cd "$DEPLOY_PATH"

          if [ -n "${NUXT_PUBLIC_BASE_URL:-}" ]; then
            export NUXT_PUBLIC_BASE_URL
          fi

          if [ -n "${NUXT_PUBLIC_API_BASE:-}" ]; then
            export NUXT_PUBLIC_API_BASE
          fi

          if [ -n "${NUXT_PUBLIC_JOBS_PORTAL_BASE:-}" ]; then
            export NUXT_PUBLIC_JOBS_PORTAL_BASE
          fi

          export NITRO_PRESET=node-server

          # ════════════════════════════════════════════════════════════
          # 1. STOP OLD SERVER
          #
          # CRITICAL: All kill commands run WITHOUT sudo because:
          #   - The Nuxt process runs as the deploy user (nlgfc_admin)
          #   - sudo requires a password, which fails silently in
          #     batch SSH mode (-o BatchMode=yes), leaving orphaned
          #     processes alive on port 3000.
          #   - A user can always kill their own processes without sudo.
          # ════════════════════════════════════════════════════════════
          echo "=== Step 1: Stopping old server ==="

          if command -v pm2 >/dev/null 2>&1; then
            echo "--- PM2 status before cleanup ---"
            pm2 list || true

            # Delete by PM2 name — covers current + legacy + accidental names.
            for name in "${PM2_APP_NAME:-frontend}" frontend index frontendclear nlgfc-frontend nlgfc-website; do
              pm2 delete "$name" 2>/dev/null || true
            done
          fi

          # Kill by FULL command path — catches orphaned node processes
          # that PM2 lost track of. No sudo needed (same user).
          pkill -f "$DEPLOY_PATH/.output/server/index.mjs" 2>/dev/null || true
          # Also match shorter pattern for manual starts.
          pkill -f "\.output/server/index\.mjs" 2>/dev/null || true
          sleep 2

          # Force-kill (SIGKILL) any survivors.
          pkill -9 -f "$DEPLOY_PATH/.output/server/index.mjs" 2>/dev/null || true
          pkill -9 -f "\.output/server/index\.mjs" 2>/dev/null || true

          # Kill by port — no sudo needed for own processes.
          if command -v fuser >/dev/null 2>&1; then
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 1
            fuser -k -9 3000/tcp 2>/dev/null || true
          fi

          sleep 2

          # Verify port 3000 is free (retry loop with escalation).
          for attempt in 1 2 3; do
            if ! ss -tln 'sport = :3000' 2>/dev/null | grep -q LISTEN; then
              echo "Port 3000 is free (attempt $attempt)"
              break
            fi
            echo "Port 3000 still occupied (attempt $attempt), escalating..."

            # Try to find and kill the PID directly.
            PORT_PID="$(ss -tlnp 'sport = :3000' 2>/dev/null | grep -oP 'pid=\K[0-9]+' | head -1 || true)"
            if [ -n "$PORT_PID" ]; then
              echo "Killing PID $PORT_PID on port 3000"
              kill -9 "$PORT_PID" 2>/dev/null || true
            fi

            # Last resort: try sudo (may fail in batch SSH, that's OK).
            fuser -k -9 3000/tcp 2>/dev/null || true
            sudo fuser -k -9 3000/tcp 2>/dev/null || true
            sleep 3
          done

          # Final check — FAIL if port is still occupied.
          if ss -tln 'sport = :3000' 2>/dev/null | grep -q LISTEN; then
            echo "FATAL: Cannot free port 3000 after all cleanup attempts!"
            echo "Port is held by a process this user cannot kill."
            ss -tlnp 'sport = :3000' 2>/dev/null || true
            exit 1
          fi

          # ════════════════════════════════════════════════════════════
          # 2. CLEAN + BUILD
          #
          # CRITICAL: Remove .output/ and .nuxt/ BEFORE building.
          # Without this, stale files from previous builds remain
          # and the new server bundle may reference old chunk names
          # that no longer exist (or vice versa).
          # ════════════════════════════════════════════════════════════
          echo "=== Step 2: Clean build ==="
          rm -rf .output .nuxt

          unset NODE_ENV || true
          npm ci --include=dev
          npm run build

          # Verify build produced expected output.
          if [ ! -f ".output/server/index.mjs" ]; then
            echo "FATAL: Build failed — .output/server/index.mjs not found"
            exit 1
          fi
          if [ ! -d ".output/public/_nuxt" ]; then
            echo "FATAL: Build failed — .output/public/_nuxt/ not found"
            exit 1
          fi
          echo "Build produced $(ls .output/public/_nuxt/*.js 2>/dev/null | wc -l) JS chunks"

          # ════════════════════════════════════════════════════════════
          # 3. START NEW SERVER
          # ════════════════════════════════════════════════════════════
          echo "=== Step 3: Starting new server ==="

          if [ -n "${PM2_APP_NAME:-}" ] && command -v pm2 >/dev/null 2>&1; then
            export NODE_ENV=production
            export HOST=127.0.0.1
            export PORT=3000
            export NITRO_HOST=127.0.0.1
            export NITRO_PORT=3000

            pm2 start "$DEPLOY_PATH/.output/server/index.mjs" \
              --name "$PM2_APP_NAME" \
              --cwd "$DEPLOY_PATH" \
              --interpreter "$(command -v node)" \
              --update-env \
              --restart-delay 5000 \
              --max-restarts 3

            pm2 save || true

            # Wait for the app to be ready (up to ~30 seconds).
            echo "--- Waiting for app to respond ---"
            READY=0
            for i in $(seq 1 15); do
              if curl -sS -o /dev/null --max-time 5 "http://127.0.0.1:3000/nlgfc-website/" 2>/dev/null; then
                READY=1
                echo "App responding on port 3000 after ~$((i*2)) seconds"
                break
              fi
              sleep 2
            done

            if [ "$READY" -ne 1 ]; then
              echo "FATAL: App not responding on port 3000 after 30 seconds"
              pm2 logs "$PM2_APP_NAME" --nostream --lines 30 || true
              exit 1
            fi

            # ════════════════════════════════════════════════════════════
            # 4. VERIFY BUILD CONSISTENCY
            #    Ensure the HTML served by Node references JS files that
            #    actually exist on disk. If they don't match, the server
            #    is running a stale build from memory.
            # ════════════════════════════════════════════════════════════
            echo "=== Step 4: Verifying build consistency ==="
            JS_FROM_HTML="$(curl -sS --max-time 10 "http://127.0.0.1:3000/nlgfc-website/" \
              | grep -oP '/_nuxt/[A-Za-z0-9_-]+\.js' | head -1 || true)"
            if [ -n "$JS_FROM_HTML" ]; then
              JS_FILE=".output/public${JS_FROM_HTML}"
              if [ -f "$JS_FILE" ]; then
                echo "PASS: HTML references $JS_FROM_HTML — file exists on disk"
              else
                echo "FATAL: HTML references $JS_FROM_HTML but file does NOT exist!"
                echo "The server is running a stale build. Dumping diagnostics:"
                echo "HTML references:"
                curl -sS --max-time 10 "http://127.0.0.1:3000/nlgfc-website/" \
                  | grep -oP '/_nuxt/[A-Za-z0-9_-]+\.js' | head -5 || true
                echo "Files on disk:"
                ls .output/public/_nuxt/*.js 2>/dev/null | head -5 || true
                exit 1
              fi
            fi

            echo "--- PM2 final status ---"
            pm2 list || true
          elif [ -n "${SYSTEMD_SERVICE_NAME:-}" ]; then
            sudo systemctl restart "$SYSTEMD_SERVICE_NAME"
          else
            echo "No PM2_APP_NAME or SYSTEMD_SERVICE_NAME configured. Build completed, restart skipped."
          fi
          EOF

      # NOTE: The nginx patcher step was removed. The nginx ^~ /nlgfc-website/
      # proxy block is already configured and running it every deploy was fragile.

      - name: Post-deploy smoke checks
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          SSH_OPTS="-p ${PORT} -o BatchMode=yes -o StrictHostKeyChecking=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no"

          ssh ${SSH_OPTS} "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "PM2_APP_NAME='${PM2_APP_NAME}' DEPLOY_PATH='${DEPLOY_PATH}' bash -s" << 'EOF'
          set -euo pipefail

          check_url () {
            local label="$1"
            local url="$2"
            local max_time="${3:-30}"
            local result
            result="$(curl -sS -o /dev/null -w "%{http_code} %{time_total}" --max-time "$max_time" "$url" || echo "000 0")"
            echo "$label -> $result ($url)"
            local code
            code="$(echo "$result" | awk '{print $1}')"
            if [ "$code" != "200" ]; then
              return 1
            fi
            return 0
          }

          failed=0

          if command -v pm2 >/dev/null 2>&1 && [ -n "${PM2_APP_NAME:-}" ]; then
            pm2 describe "$PM2_APP_NAME" || true
          fi

          # Always dump nginx config for /nlgfc-website so we can diagnose asset routing.
          echo "--- nginx config summary ---"
          sudo nginx -T 2>/dev/null | grep -B 2 -A 15 'nlgfc-website\|proxy_pass' | head -80 || true
          echo "--- .output/public layout ---"
          find "${DEPLOY_PATH:-.}/.output/public" -maxdepth 2 -type d 2>/dev/null || true
          ls "${DEPLOY_PATH:-.}/.output/public/_nuxt/" 2>/dev/null | head -5 || echo "_nuxt/ not at .output/public/_nuxt/"

          check_url "node-local" "http://127.0.0.1:3000/nlgfc-website/" 30 || failed=1
          check_url "public-home" "http://127.0.0.1:8080/nlgfc-website/" 70 || failed=1
          check_url "public-contact" "http://127.0.0.1:8080/nlgfc-website/contact" 70 || failed=1

          # Verify JS bundles are served (critical for client-side hydration).
          echo "--- JS bundle smoke check ---"
          homepage_html="$(curl -sS --max-time 30 "http://127.0.0.1:3000/nlgfc-website/" || true)"
          js_path="$(echo "$homepage_html" | grep -oP 'src="/nlgfc-website/_nuxt/[^"]+\.js"' | head -1 | sed 's/src="//;s/"//')"
          if [ -n "$js_path" ]; then
            echo "Found JS bundle: $js_path"
            check_url "node-js-bundle" "http://127.0.0.1:3000${js_path}" 15 || failed=1
            check_url "nginx-js-bundle" "http://127.0.0.1:8080${js_path}" 15 || failed=1
          else
            echo "WARNING: Could not extract JS bundle path from homepage HTML"
          fi

          if [ "$failed" -ne 0 ]; then
            echo "============================================"
            echo "Smoke check FAILED. Collecting diagnostics..."
            echo "============================================"

            echo "--- PM2 status ---"
            if command -v pm2 >/dev/null 2>&1; then
              pm2 status || true
              if [ -n "${PM2_APP_NAME:-}" ]; then
                pm2 show "$PM2_APP_NAME" || true
                pm2 logs "$PM2_APP_NAME" --nostream --lines 200 || true
              else
                pm2 logs --nostream --lines 200 || true
              fi
            fi

            echo "--- nginx config (nlgfc-website) ---"
            sudo nginx -T 2>/dev/null | grep -A 30 'nlgfc-website\|proxy_pass\|location' | head -100 || true

            echo "--- .output directory listing ---"
            ls -la "${DEPLOY_PATH:-.}/.output/public/" 2>/dev/null | head -20 || true
            ls -la "${DEPLOY_PATH:-.}/.output/public/nlgfc-website/" 2>/dev/null | head -20 || true
            ls -la "${DEPLOY_PATH:-.}/.output/public/_nuxt/" 2>/dev/null | head -20 || true

            echo "--- Listening ports ---"
            ss -ltnp | grep -E ':3000|:8080' || true
            lsof -nP -iTCP:3000 -sTCP:LISTEN || true
            lsof -nP -iTCP:8080 -sTCP:LISTEN || true

            echo "--- nginx error log (last 100) ---"
            tail -n 100 /var/log/nginx/error.log || true
            echo "--- nginx access log (last 50) ---"
            tail -n 50 /var/log/nginx/access.log || true
            echo "============================================"
            echo "FATAL: Smoke check detected issues above."
            echo "============================================"
            exit 1
          fi
          EOF
